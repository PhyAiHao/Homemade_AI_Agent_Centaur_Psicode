name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
        working-directory: agent-core

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
        working-directory: agent-core
      - run: cargo clippy -- -D warnings
        working-directory: agent-core

  build:
    name: Build ${{ matrix.target }}
    needs: [test, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: agent-core
      - name: Package binary
        run: |
          cd agent-core/target/${{ matrix.target }}/release
          tar czf agent-${{ matrix.target }}.tar.gz agent
      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.target }}
          path: agent-core/target/${{ matrix.target }}/release/agent-${{ matrix.target }}.tar.gz

  universal-macos:
    name: Universal macOS Binary
    needs: build
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: agent-x86_64-apple-darwin
      - uses: actions/download-artifact@v4
        with:
          name: agent-aarch64-apple-darwin
      - name: Create universal binary
        run: |
          tar xzf agent-x86_64-apple-darwin.tar.gz -C /tmp/x86
          tar xzf agent-aarch64-apple-darwin.tar.gz -C /tmp/arm
          lipo -create /tmp/x86/agent /tmp/arm/agent -output agent
          tar czf agent-universal-apple-darwin.tar.gz agent
      - uses: actions/upload-artifact@v4
        with:
          name: agent-universal-apple-darwin
          path: agent-universal-apple-darwin.tar.gz

  release:
    name: Release
    needs: [build, universal-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent-x86_64-apple-darwin/*.tar.gz
            agent-aarch64-apple-darwin/*.tar.gz
            agent-universal-apple-darwin/*.tar.gz
            agent-x86_64-unknown-linux-gnu/*.tar.gz
            agent-aarch64-unknown-linux-gnu/*.tar.gz
          generate_release_notes: true
